# iOS Development Team Configuration
# Platform: iOS
# Category: platform

TEAM_ID="ios"
TEAM_NAME="Star Trek: TNG - iOS"
TEAM_DESCRIPTION="iOS app development with Swift/SwiftUI"
TEAM_CATEGORY="platform"
TEAM_COLOR="#FF9500"           # LCARS display color (orange)
TEAM_LCARS_PORT="8260"         # Default LCARS port for iOS team
TEAM_TMUX_SOCKET="ios"         # Dedicated tmux socket name

# Working directory (where this team's kanban boards and files live)
TEAM_WORKING_DIR="$HOME/ios"
TEAM_HAS_PROJECTS="false"

# Repository associations
TEAM_REPOS=()

# Homebrew dependencies (tools to install)
TEAM_BREW_DEPS=(
    "swiftlint"
    "xcodegen"
)

# Homebrew cask dependencies
# NOTE: Xcode must be installed via the Mac App Store — it is not available
# as a Homebrew cask. Install manually before running this team's setup.
TEAM_BREW_CASK_DEPS=()

# Terminal roles (matches prompt files: ios-{role}-prompt.txt)
TEAM_AGENTS=(
    "bridge"       # Captain Jean-Luc Picard
    "engineering"  # Lieutenant Commander Geordi La Forge
    "holodeck"     # Lieutenant Worf
    "observation"  # Counselor Deanna Troi
    "sickbay"      # Doctor Beverly Crusher
    "stellar"      # Lieutenant Commander Data
)

# Per-agent tmux window names (space-separated: win0 win1 win2 win3)
# Based on TNG station roles
AGENT_WINDOWS_captain="bridge features architecture review"
AGENT_WINDOWS_doctor="sickbay diagnostics crash-logs debugging"
AGENT_WINDOWS_seven="stellar analysis optimization patterns"
AGENT_WINDOWS_kim="observation api-docs code-docs guides"
AGENT_WINDOWS_torres="engineering build cicd deployment"
AGENT_WINDOWS_wesley="holodeck ui-design ux-research accessibility"
AGENT_WINDOWS_tuvok="tactics unit-tests ui-tests coverage"

# Startup/shutdown script names
TEAM_STARTUP_SCRIPT="ios-startup.sh"
TEAM_SHUTDOWN_SCRIPT="ios-shutdown.sh"

# Organization this team belongs to
TEAM_ORGANIZATION="Main Event Entertainment"

# Star Trek theme
TEAM_THEME="Star Trek: The Next Generation"
TEAM_SHIP="USS Enterprise-D"
