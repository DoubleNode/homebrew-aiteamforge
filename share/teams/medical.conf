# Medical Team Configuration
# Medical documentation and research support
# Category: strategic

TEAM_ID="medical"
TEAM_NAME="House MD"
TEAM_DESCRIPTION="Medical documentation and research support"
TEAM_CATEGORY="strategic"
TEAM_COLOR="#00FFFF"           # LCARS display color (cyan)
TEAM_LCARS_PORT="8340"         # Default LCARS port for Medical team
TEAM_TMUX_SOCKET="medical"     # Dedicated tmux socket name

# Working directory (where this team's projects live)
# Medical has sub-projects — each project gets its own kanban board
TEAM_WORKING_DIR="$HOME/medical"
TEAM_HAS_PROJECTS="true"
TEAM_DEFAULT_PROJECT="general"

# Repository associations
TEAM_REPOS=()

# Homebrew dependencies (minimal)
TEAM_BREW_DEPS=()

# Homebrew cask dependencies
TEAM_BREW_CASK_DEPS=()

# Terminal roles (matches prompt files: medical-{role}-prompt.txt)
TEAM_AGENTS=(
    "diagnostics" # Dr. Gregory House
    "emergency"   # Dr. Lisa Cuddy
    "immunology"  # Dr. Allison Cameron
    "neurology"   # Dr. Eric Foreman
    "oncology"    # Dr. James Wilson
    "surgery"     # Dr. Robert Chase
)

# Per-agent tmux window names (space-separated: win0 win1 win2 win3)
# Based on Princeton-Plainsboro Teaching Hospital departments
AGENT_WINDOWS_house="diagnostics-cmd differential case-review whiteboard"
AGENT_WINDOWS_chase="surgery-cmd triage hotfix post-op"
AGENT_WINDOWS_cameron="immunology-cmd test-suite integration coverage"
AGENT_WINDOWS_foreman="neurology-cmd code-scan refactor optimization"
AGENT_WINDOWS_wilson="oncology-cmd documentation api-docs team-comms"
AGENT_WINDOWS_cuddy="emergency-cmd release-prep deployment monitoring"

# Startup/shutdown script names
TEAM_STARTUP_SCRIPT="medical-startup.sh"
TEAM_SHUTDOWN_SCRIPT="medical-shutdown.sh"

# Organization this team belongs to
TEAM_ORGANIZATION="DoubleNode"

# Theme
TEAM_THEME="House MD"
TEAM_SHIP="Princeton-Plainsboro Teaching Hospital"
