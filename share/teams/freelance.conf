# Freelance Team Configuration
# Full-stack project-based development
# Category: project

TEAM_ID="freelance"
TEAM_NAME="Star Trek: Enterprise - Full Stack Team"
TEAM_DESCRIPTION="Full-stack freelance project development (iOS, Android, Firebase)"
TEAM_CATEGORY="project"
TEAM_COLOR="#FF6699"           # LCARS display color (pink)
TEAM_LCARS_PORT="8300"         # Default LCARS port for Freelance team
TEAM_TMUX_SOCKET="freelance"   # Dedicated tmux socket name

# Working directory (where this team's kanban boards and files live)
TEAM_WORKING_DIR="$HOME/freelance"
TEAM_HAS_PROJECTS="true"
TEAM_REQUIRES_CLIENT_ID="true"
TEAM_DEFAULT_PROJECT="default"

# Repository associations (varies by project)
TEAM_REPOS=()

# Homebrew dependencies (full-stack tools)
TEAM_BREW_DEPS=(
    "swiftlint"
    "xcodegen"
    "gradle"
    "kotlin"
    "node"
    "firebase-cli"
)

# Homebrew cask dependencies
TEAM_BREW_CASK_DEPS=(
    "xcode"
    "android-studio"
)

# Terminal roles (matches prompt files: freelance-{role}-prompt.txt)
TEAM_AGENTS=(
    "command"     # Captain Jonathan Archer
    "comms"       # Ensign Hoshi Sato
    "engineering" # Commander Charles "Trip" Tucker III
    "helm"        # Ensign Travis Mayweather
    "science"     # Sub-Commander T'Pol
    "sickbay"     # Dr. Phlox
    "tactical"    # Lieutenant Malcolm Reed
)

# Startup/shutdown script names
TEAM_STARTUP_SCRIPT="freelance-startup.sh"
TEAM_SHUTDOWN_SCRIPT="freelance-shutdown.sh"

# Organization this team belongs to
TEAM_ORGANIZATION="Freelance"

# Star Trek theme
TEAM_THEME="Star Trek: Enterprise"
TEAM_SHIP="Enterprise NX-01"
