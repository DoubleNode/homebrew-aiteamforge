# Legal Team Configuration
# Legal research and documentation
# Category: strategic

TEAM_ID="legal"
TEAM_NAME="Boston Legal"
TEAM_DESCRIPTION="Legal research and documentation support"
TEAM_CATEGORY="strategic"
TEAM_COLOR="#FFFF00"           # LCARS display color (yellow)
TEAM_LCARS_PORT="8320"         # Default LCARS port for Legal team
TEAM_TMUX_SOCKET="legal"       # Dedicated tmux socket name

# Working directory (where this team's projects live)
# Legal has sub-projects — each project gets its own kanban board
TEAM_WORKING_DIR="$HOME/legal"
TEAM_HAS_PROJECTS="true"
TEAM_DEFAULT_PROJECT="default"

# Repository associations
TEAM_REPOS=()

# Homebrew dependencies (minimal)
TEAM_BREW_DEPS=()

# Homebrew cask dependencies
TEAM_BREW_CASK_DEPS=()

# Terminal roles (matches prompt files: legal-{role}-prompt.txt)
TEAM_AGENTS=(
    "chambers"   # Denny Crane
    "discovery"  # Jerry Espenson
    "filings"    # Brad Chase
    "mediation"  # Alan Shore
    "research"   # Carl Sack
    "timeline"   # Shirley Schmidt
)

# Startup/shutdown script names
TEAM_STARTUP_SCRIPT="legal-startup.sh"
TEAM_SHUTDOWN_SCRIPT="legal-shutdown.sh"

# Organization this team belongs to
TEAM_ORGANIZATION="DoubleNode"

# Theme
TEAM_THEME="Boston Legal"
TEAM_SHIP="Crane, Poole & Schmidt"
