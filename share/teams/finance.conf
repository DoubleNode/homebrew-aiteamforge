# Finance Team Configuration
# Personal finance management and automation
# Category: personal

TEAM_ID="finance"
TEAM_NAME="Ferengi Commerce Authority"
TEAM_DESCRIPTION="Personal finance management and automation"
TEAM_CATEGORY="personal"
TEAM_COLOR="#FFD700"           # LCARS display color (gold)
TEAM_LCARS_PORT="8360"         # Default LCARS port for Finance team
TEAM_TMUX_SOCKET="finance"     # Dedicated tmux socket name

# Working directory (where this team's projects live)
# Finance has sub-projects — each project gets its own kanban board
TEAM_WORKING_DIR="$HOME/finance"
TEAM_HAS_PROJECTS="true"
TEAM_DEFAULT_PROJECT="personal"

# Repository associations
TEAM_REPOS=()

# Homebrew dependencies (minimal)
TEAM_BREW_DEPS=()

# Homebrew cask dependencies
TEAM_BREW_CASK_DEPS=()

# Agent personas (Claude Code agent names)
TEAM_AGENTS=(
    "zek"         # Lead Financial Strategist (Grand Nagus)
    "quark-fin"   # Budget & Expense Manager
    "nog"         # Investment Analyst
    "brunt"       # Tax & Compliance Auditor
    "rom"         # Finance Automation Engineer
)

# Startup/shutdown script names
TEAM_STARTUP_SCRIPT="finance-startup.sh"
TEAM_SHUTDOWN_SCRIPT="finance-shutdown.sh"

# Theme
TEAM_THEME="Star Trek: Deep Space Nine - Ferengi"
TEAM_SHIP="Ferengi Alliance Commerce Hub"
