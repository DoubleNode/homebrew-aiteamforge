# Academy Team Configuration
# Infrastructure team managing dev-team environment itself
# Category: infrastructure

TEAM_ID="academy"
TEAM_NAME="Starfleet Academy"
TEAM_DESCRIPTION="AI team development infrastructure and tooling"
TEAM_CATEGORY="infrastructure"
TEAM_COLOR="#0099CC"           # LCARS display color (blue)
TEAM_LCARS_PORT="8200"         # Default LCARS port for Academy team
TEAM_TMUX_SOCKET="academy"     # Dedicated tmux socket name

# Working directory (where this team's kanban boards and files live)
TEAM_WORKING_DIR="$HOME/academy"
TEAM_HAS_PROJECTS="false"       # true if team has sub-projects (e.g., legal, medical)

# Repository associations (Academy owns dev-team infrastructure)
TEAM_REPOS=(
    "dev-team"
)

# Homebrew dependencies (tools to install)
TEAM_BREW_DEPS=(
    "python@3"
    "node"
    "jq"
    "gh"
)

# Homebrew cask dependencies
TEAM_BREW_CASK_DEPS=()

# Terminal roles (matches prompt files: academy-{role}-prompt.txt)
TEAM_AGENTS=(
    "chancellor"   # Academy Chancellor (Nahla Ake)
    "engineering"  # Chief Technical Instructor (Jett Reno)
    "medical"      # Documentation Specialist (The Doctor EMH)
    "training"     # Testing Coordinator (Lura Thok)
)

# Per-agent tmux window names (space-separated: win0 win1 win2 win3)
# Matches the existing dev-team terminal definitions
AGENT_WINDOWS_chancellor="chancellor-cmd architecture strategy coordination"
AGENT_WINDOWS_reno="engineering-cmd scripts infrastructure debugging"
AGENT_WINDOWS_emh="medical-cmd documentation training knowledge"
AGENT_WINDOWS_thok="training-cmd testing standards quality"

# Startup/shutdown script names
TEAM_STARTUP_SCRIPT="academy-startup.sh"
TEAM_SHUTDOWN_SCRIPT="academy-shutdown.sh"

# Organization this team belongs to
TEAM_ORGANIZATION="Starfleet Academy"

# Star Trek theme
TEAM_THEME="Starfleet Academy"
TEAM_SHIP="Starfleet Academy Campus"
