# Android Development Team Configuration
# Platform: Android
# Category: platform

TEAM_ID="android"
TEAM_NAME="Star Trek: TOS - Android"
TEAM_DESCRIPTION="Android app development with Kotlin"
TEAM_CATEGORY="platform"
TEAM_COLOR="#3DDC84"           # LCARS display color (green)
TEAM_LCARS_PORT="8280"         # Default LCARS port for Android team
TEAM_TMUX_SOCKET="android"     # Dedicated tmux socket name

# Working directory (where this team's kanban boards and files live)
TEAM_WORKING_DIR="$HOME/android"
TEAM_HAS_PROJECTS="false"

# Repository associations
TEAM_REPOS=()

# Homebrew dependencies (tools to install)
TEAM_BREW_DEPS=(
    "gradle"
    "kotlin"
)

# Homebrew cask dependencies
TEAM_BREW_CASK_DEPS=(
    "android-studio"
)

# Terminal roles (matches prompt files: android-{role}-prompt.txt)
TEAM_AGENTS=(
    "bridge"         # Captain James T. Kirk
    "communications" # Lieutenant Nyota Uhura
    "engineering"    # Lieutenant Commander Montgomery "Scotty" Scott
    "helm"           # Lieutenant Hikaru Sulu
    "navigation"     # Ensign Pavel Chekov
    "science"        # Commander Spock
    "sickbay"        # Dr. Leonard "Bones" McCoy
)

# Startup/shutdown script names
TEAM_STARTUP_SCRIPT="android-startup.sh"
TEAM_SHUTDOWN_SCRIPT="android-shutdown.sh"

# Organization this team belongs to
TEAM_ORGANIZATION="Main Event Entertainment"

# Star Trek theme
TEAM_THEME="Star Trek: The Original Series"
TEAM_SHIP="Starship Enterprise NCC-1701"
