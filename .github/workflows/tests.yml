name: Test Homebrew Formula

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Formula/**'
      - '.github/workflows/tests.yml'
      - 'homebrew-tap/tests/**'
      - 'scripts/tests/**'
      - 'fleet-monitor/**'
      - 'lcars-ui/**'
      - 'kanban-hooks/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Formula/**'
      - '.github/workflows/tests.yml'
      - 'homebrew-tap/tests/**'
      - 'scripts/tests/**'
      - 'fleet-monitor/**'
      - 'lcars-ui/**'
      - 'kanban-hooks/**'
  workflow_dispatch:

jobs:
  test-formula:
    name: Test Formula on macOS
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-13, macos-14]  # Intel and ARM

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            ~/Library/Caches/pip
          key: ${{ runner.os }}-homebrew-${{ hashFiles('Formula/dev-team.rb') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-

      - name: Install formula dependencies
        run: |
          brew install python@3.13 node jq gh git

      - name: Tap local repository
        run: |
          mkdir -p $(brew --repository)/Library/Taps/doublenode
          ln -s $PWD $(brew --repository)/Library/Taps/doublenode/homebrew-dev-team

      - name: Audit formula
        if: github.ref == 'refs/heads/develop'
        run: |
          brew audit --strict --online Formula/dev-team.rb

      - name: Install formula
        run: |
          brew install --verbose --build-from-source dev-team

      - name: Test formula
        run: |
          brew test dev-team

      - name: Verify installation
        run: |
          # Check main commands exist
          which dev-team
          which dev-team-setup
          which dev-team-doctor

          # Check they're executable
          dev-team --version
          dev-team-setup --help
          dev-team-doctor --version

          # Verify core files installed
          test -d $(brew --prefix)/opt/dev-team/libexec/scripts
          test -d $(brew --prefix)/opt/dev-team/libexec/config/templates
          test -d $(brew --prefix)/opt/dev-team/libexec/docs
          test -f $(brew --prefix)/opt/dev-team/libexec/kanban-helpers.sh

      - name: Test setup wizard (dry run)
        run: |
          # Test help output
          dev-team setup --help

      - name: Test doctor (without config)
        run: |
          # Should report not configured but not crash
          dev-team doctor --check dependencies || true
          dev-team doctor --check framework

      - name: Uninstall formula
        run: |
          brew uninstall dev-team

      - name: Verify clean uninstall
        run: |
          # Commands should not exist
          ! which dev-team || exit 1
          ! which dev-team-setup || exit 1
          ! which dev-team-doctor || exit 1

  lint-formula:
    name: Lint Formula
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Lint formula with brew style
        run: |
          brew style Formula/dev-team.rb

      - name: Lint formula with RuboCop
        run: |
          brew install --quiet rubocop
          rubocop Formula/dev-team.rb

  test-scripts:
    name: Test Core Scripts
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install python@3.13 node jq

      - name: Check script syntax
        run: |
          # Check bash scripts
          bash -n bin/dev-team-cli.sh
          bash -n bin/dev-team-setup.sh
          bash -n bin/dev-team-doctor.sh

      - name: Run ShellCheck on scripts
        run: |
          brew install shellcheck
          shellcheck bin/*.sh || true  # Allow warnings for now

      - name: Test script permissions
        run: |
          # Scripts should be executable
          test -x bin/dev-team-cli.sh
          test -x bin/dev-team-setup.sh
          test -x bin/dev-team-doctor.sh

  # ─────────────────────────────────────────────────────────────────────────────
  # Shell Test Suites — homebrew-tap/tests/
  # ─────────────────────────────────────────────────────────────────────────────
  test-shell-homebrew-tap:
    name: Shell Tests (homebrew-tap)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install jq

      - name: Make test scripts executable
        run: |
          chmod +x homebrew-tap/tests/test-runner.sh
          chmod +x homebrew-tap/tests/test-*.sh

      - name: Run validate-install tests
        run: |
          bash homebrew-tap/tests/test-runner.sh homebrew-tap/tests/test-validate-install.sh

      - name: Run python-venv tests
        run: |
          bash homebrew-tap/tests/test-runner.sh homebrew-tap/tests/test-python-venv.sh

      - name: Run team-banner tests
        run: |
          bash homebrew-tap/tests/test-runner.sh homebrew-tap/tests/test-team-banner.sh

      - name: Run board-template tests
        run: |
          bash homebrew-tap/tests/test-runner.sh homebrew-tap/tests/test-board-template.sh

      - name: Run doctor-fix tests
        run: |
          bash homebrew-tap/tests/test-runner.sh homebrew-tap/tests/test-doctor-fix.sh

      - name: Run e2e-setup-launch tests
        # NON_INTERACTIVE prevents the setup wizard from blocking on user input
        env:
          NON_INTERACTIVE: "true"
        run: |
          bash homebrew-tap/tests/test-runner.sh homebrew-tap/tests/test-e2e-setup-launch.sh

      - name: Run multi-team tests
        run: |
          bash homebrew-tap/tests/test-runner.sh homebrew-tap/tests/test-multi-team.sh

      - name: Run tailscale tests
        # Tailscale is not installed in CI — tests use internal mocks so no real binary needed
        run: |
          bash homebrew-tap/tests/test-runner.sh homebrew-tap/tests/test-tailscale.sh

  # ─────────────────────────────────────────────────────────────────────────────
  # Shell Test Suites — scripts/tests/ and fleet-monitor/client/tests/
  # ─────────────────────────────────────────────────────────────────────────────
  test-shell-scripts:
    name: Shell Tests (scripts + fleet client)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install jq

      - name: Make test scripts executable
        run: |
          chmod +x homebrew-tap/tests/test-runner.sh
          chmod +x scripts/tests/test-*.sh
          chmod +x fleet-monitor/client/tests/test-*.sh

      - name: Run agent-panel-display tests
        # tmux is not required — the test mocks tmux calls internally
        run: |
          # test-agent-panel-display.sh bootstraps its own runner via test-runner.sh
          bash scripts/tests/test-agent-panel-display.sh

      - name: Run fleet-reporter tests
        # Real tmux/iTerm2 not needed — reporter tests mock network calls
        run: |
          bash fleet-monitor/client/tests/test-fleet-reporter.sh

      - name: Run lcars-tmp-dir-consistency tests
        # Cross-validates shell helper, Python function, and TEAM_KANBAN_DIRS stay in sync
        run: |
          bash scripts/tests/test-lcars-tmp-dir-consistency.sh

  # ─────────────────────────────────────────────────────────────────────────────
  # Python Test Suites
  # ─────────────────────────────────────────────────────────────────────────────
  test-python:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install any test dependencies (unittest is stdlib — no extras needed)
          # jq is needed by some modules at runtime but tests stub those paths
          brew install jq

      - name: Run lcars-ui server tests
        # server.py optionally imports iterm2, calendar sync, and kanban_utils;
        # the test file stubs all three before import so no real installs needed.
        run: |
          python -m unittest discover -s lcars-ui/tests -p 'test_*.py' -v

      - name: Run kanban-hooks tests
        run: |
          python -m unittest discover -s kanban-hooks/tests -p 'test_*.py' -v

      - name: Run scripts Python tests
        # iterm2_window_manager.py requires the 'iterm2' pip package at import time;
        # the test stubs sys.modules['iterm2'] before importing, so no real package needed.
        run: |
          python -m unittest discover -s scripts/tests -p 'test_*.py' -v

  # ─────────────────────────────────────────────────────────────────────────────
  # Node.js Test Suites — fleet-monitor/server/tests/
  # ─────────────────────────────────────────────────────────────────────────────
  test-node:
    name: Node.js Tests (${{ matrix.node-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: fleet-monitor/server/package-lock.json

      - name: Install fleet-monitor server dependencies
        working-directory: fleet-monitor/server
        run: |
          npm ci

      - name: Run fleet-monitor server tests
        # Tests use node:test (built-in, Node 18+) and supertest for HTTP assertions.
        # No real kanban board, tmux, or external services are needed — app-factory.js
        # creates isolated in-memory Express instances for each test.
        working-directory: fleet-monitor/server
        run: |
          npm test
